<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Polyfill to prevent "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          var currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return currentFetch; },
            set: function(val) { currentFetch = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            var protoFetch = Window.prototype.fetch;
            Object.defineProperty(Window.prototype, 'fetch', {
              get: function() { return protoFetch; },
              set: function(val) { protoFetch = val; },
              configurable: true,
              enumerable: true
            });
          } catch (e2) {
            console.warn("Could not polyfill window.fetch setter:", e2);
          }
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind Design System Visualizer Pro</title>
    <!-- Import Vazirmatn font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#090d16] text-[#e2e8f0]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
